# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  # Fully uv-driven build. Using build.commands means Read the Docs runs these
  # instead of its default Sphinx step, so we build to $READTHEDOCS_OUTPUT/html.
  commands:
    - pip install uv
    - uv sync --all-extras --group docs
    - uv run sphinx-apidoc --force --implicit-namespaces --module-first -o docs/reference src/pydna
    - uv run sphinx-build -n --keep-going -b html docs $READTHEDOCS_OUTPUT/html
