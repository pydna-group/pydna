name: Tests & Coverage
on:
  push:
    branches:
      - master
      - "pydna*"
  pull_request:

# One run per ref; a new push cancels the previous still-running one.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🔩 Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff check src tests
      - run: uv run ruff format --check src tests

  test:
    name: Test (${{ matrix.python-version }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      # Full Python range on Linux; only the oldest+newest on macOS/Windows,
      # which is where OS-specific breakage (not version-specific) shows up.
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - { os: macos-latest, python-version: "3.10" }
          - { os: macos-latest, python-version: "3.14" }
          - { os: windows-latest, python-version: "3.10" }
          - { os: windows-latest, python-version: "3.14" }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      MPLBACKEND: Agg
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for hatch-vcs versioning
      - name: 🔩 Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: 🔩 Install with uv
        run: uv sync --all-extras --group test
      - name: 🔎 Run tests
        run: uv run python run_test.py
      - name: 🔼 Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7.0.0
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          env_vars: OS,PYTHON
          name: codecov-umbrella
          fail_ci_if_error: true
