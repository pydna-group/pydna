name: Build for PyPI
on:
  release:
    types: [published]
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.release.target_commitish == 'master'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Build distributions
        run: uv build
      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
