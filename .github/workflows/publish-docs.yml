on: [push, pull_request]

name: "Documentation Status"

permissions:
  contents: write

jobs:
  build-and-publish:
    if: "! contains(github.event.head_commit.message, '[ci skip]')"

    timeout-minutes: 10

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Session information
        run: |
          python --version

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry==2.3.2

      - name: 🔩 list Poetry settings
        run: poetry config --list

      - name: 🔩 Install with Poetry
        run: poetry cache clear --all && poetry install --all-extras --with docs

      - name: Build documentation
        run: |
          cd docs
          poetry run sphinx-apidoc --force --implicit-namespaces --module-first -o reference ../src/pydna
          poetry run sphinx-build -n --keep-going -b html ./ ./_build/

      - name: Deploy to GitHub pages 🚀
        # Deploy only when master changes
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4.6.0
        with:
          clean: false
          branch: gh-pages
          folder: docs/_build
